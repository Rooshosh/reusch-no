<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REUSCH</title>
  <meta name="description" content="Reusch — a family from Norway">
  <meta property="og:title" content="REUSCH">
  <meta property="og:description" content="A family from Norway">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://reusch.no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    }

    /* ─── Mesh gradient background ─── */
    body {
      background: #f5ede4;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Layered radial gradients to create a mesh-like effect */
    .bg::before {
      content: '';
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, #e8c4a0 0%, transparent 70%),
        radial-gradient(ellipse 70% 80% at 75% 20%, #d4a48c 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 60% 75%, #c5b9a8 0%, transparent 60%),
        radial-gradient(ellipse 90% 50% at 30% 80%, #d6c5b0 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 85% 60%, #c9a899 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #f0e4d6 0%, transparent 80%);
      animation: meshDrift 25s ease-in-out infinite alternate;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse 60% 50% at 40% 45%, #b8a99440 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 70% 35%, #c4978a30 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 25% 65%, #bfb09e35 0%, transparent 65%);
      animation: meshDrift2 30s ease-in-out infinite alternate;
    }

    @keyframes meshDrift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(2%, -1.5%) scale(1.02); }
      66%  { transform: translate(-1.5%, 2%) scale(0.99); }
      100% { transform: translate(1%, -0.5%) scale(1.01); }
    }

    @keyframes meshDrift2 {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
      50%  { transform: translate(-2%, 1.5%) rotate(1deg) scale(1.03); }
      100% { transform: translate(1.5%, -1%) rotate(-0.5deg) scale(0.98); }
    }

    /* ─── Grain texture overlay ─── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.35;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ─── Organic floating shapes ─── */
    .shapes {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0;
      animation: shapeFloat 20s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: min(400px, 60vw);
      height: min(400px, 60vw);
      background: radial-gradient(circle, #c4907a44, transparent 70%);
      top: 15%;
      left: 10%;
      animation-duration: 22s;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: min(350px, 55vw);
      height: min(350px, 55vw);
      background: radial-gradient(circle, #a8b49644, transparent 70%);
      top: 55%;
      right: 10%;
      animation-duration: 26s;
      animation-delay: -5s;
    }

    .shape:nth-child(3) {
      width: min(300px, 50vw);
      height: min(300px, 50vw);
      background: radial-gradient(circle, #c9a08844, transparent 70%);
      bottom: 10%;
      left: 25%;
      animation-duration: 24s;
      animation-delay: -10s;
    }

    .shape:nth-child(4) {
      width: min(250px, 40vw);
      height: min(250px, 40vw);
      background: radial-gradient(circle, #b0a09044, transparent 70%);
      top: 30%;
      right: 20%;
      animation-duration: 28s;
      animation-delay: -3s;
    }

    @keyframes shapeFloat {
      0%, 100% {
        opacity: 0.6;
        transform: translate(0, 0) scale(1);
      }
      25% {
        opacity: 0.8;
        transform: translate(15px, -20px) scale(1.05);
      }
      50% {
        opacity: 0.5;
        transform: translate(-10px, 10px) scale(0.95);
      }
      75% {
        opacity: 0.7;
        transform: translate(5px, 15px) scale(1.02);
      }
    }

    /* ─── Title ─── */
    .title-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .title {
      font-size: clamp(3rem, 12vw, 10rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-indent: 0.35em; /* offset letter-spacing to visually center */
      color: #3d2e24;
      opacity: 0;
      animation: titleReveal 2.5s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      user-select: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        letter-spacing: 0.6em;
        text-indent: 0.6em;
        filter: blur(8px);
      }
      60% {
        filter: blur(0px);
      }
      100% {
        opacity: 1;
        letter-spacing: 0.35em;
        text-indent: 0.35em;
        filter: blur(0px);
      }
    }

    /* ─── Subtle decorative line ─── */
    .accent-line {
      position: fixed;
      bottom: max(12%, 60px);
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b6f5e88, transparent);
      z-index: 2;
      animation: lineGrow 2s cubic-bezier(0.22, 1, 0.36, 1) 1.5s forwards;
    }

    @keyframes lineGrow {
      to { width: min(120px, 25vw); }
    }

    /* ─── Reduce motion for accessibility ─── */
    @media (prefers-reduced-motion: reduce) {
      .bg::before,
      .bg::after { animation: none; }
      .shape { animation: none; opacity: 0.6; }
      .title {
        animation: simpleFade 1s ease forwards;
      }
      .accent-line {
        animation: simpleFade 1s ease 0.5s forwards;
        width: min(120px, 25vw);
      }
      @keyframes simpleFade {
        to { opacity: 1; }
      }
    }
  </style>
</head>
<body>
  <!-- Mesh gradient background -->
  <div class="bg"></div>

  <!-- Grain texture -->
  <div class="grain"></div>

  <!-- Floating organic shapes -->
  <div class="shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <!-- Title -->
  <div class="title-container">
    <h1 class="title">REUSCH</h1>
  </div>

  <!-- Decorative accent -->
  <div class="accent-line"></div>
</body>
</html>
