<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>REUSCH</title>
  <meta name="description" content="Reusch — Technology & Design from Norway">
  <meta property="og:title" content="REUSCH">
  <meta property="og:description" content="Technology & Design from Norway">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://reusch.no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Space Grotesk', sans-serif;
    }
    #particles { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    .title-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }
    .title-text {
      font-size: clamp(2.8rem, 11vw, 9rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.95);
      text-shadow:
        0 0 80px rgba(74, 158, 255, 0.25),
        0 0 160px rgba(74, 158, 255, 0.08);
      opacity: 0;
      animation: fadeIn 3s ease-out 0.5s forwards;
      user-select: none;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); letter-spacing: 0.5em; }
      100% { opacity: 1; transform: translateY(0); letter-spacing: 0.3em; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="title-overlay">
    <h1 class="title-text">REUSCH</h1>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;

    const PARTICLE_COUNT = 1800;
    const MOUSE_RADIUS = 150;
    const MOUSE_FORCE = 6;
    const CONNECTION_DIST = 90;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Mouse
    const mouse = { x: -9999, y: -9999, active: false };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
    window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true; }, { passive: true });
    window.addEventListener('mouseleave', () => { mouse.active = false; });
    window.addEventListener('touchend', () => { mouse.active = false; });

    // Particles
    const particles = [];

    class Particle {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.ox = this.x;
        this.oy = this.y;
        this.vx = (Math.random() - 0.5) * 0.2;
        this.vy = (Math.random() - 0.5) * 0.2;
        this.size = Math.random() * 2 + 0.3;
        this.phase = Math.random() * Math.PI * 2;
        this.twinkleSpeed = 0.3 + Math.random() * 1.2;

        // Scandinavian palette: ice blues, white, with occasional warmer accent
        const t = Math.random();
        if (t < 0.25) {
          // Deep muted blue
          this.r = 25; this.g = 50; this.b = 120;
          this.baseAlpha = 0.3 + Math.random() * 0.3;
        } else if (t < 0.55) {
          // Medium blue
          this.r = 60; this.g = 130; this.b = 220;
          this.baseAlpha = 0.4 + Math.random() * 0.3;
        } else if (t < 0.8) {
          // Ice blue / near-white
          this.r = 160 + Math.random() * 60;
          this.g = 190 + Math.random() * 40;
          this.b = 230 + Math.random() * 25;
          this.baseAlpha = 0.5 + Math.random() * 0.4;
        } else {
          // Pure white sparkle
          this.r = 220 + Math.random() * 35;
          this.g = 230 + Math.random() * 25;
          this.b = 240 + Math.random() * 15;
          this.baseAlpha = 0.6 + Math.random() * 0.4;
          this.size = Math.random() * 1.5 + 0.3; // White ones are smaller
        }
      }

      update(time) {
        // Gentle organic drift
        this.x += this.vx + Math.sin(time * 0.3 + this.phase) * 0.1;
        this.y += this.vy + Math.cos(time * 0.25 + this.phase * 1.3) * 0.1;

        // Soft return
        this.x += (this.ox - this.x) * 0.003;
        this.y += (this.oy - this.y) * 0.003;

        // Mouse repulsion
        if (mouse.active) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MOUSE_RADIUS && dist > 0) {
            const force = (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
            this.x += (dx / dist) * force;
            this.y += (dy / dist) * force;
          }
        }

        // Twinkle
        this.alpha = this.baseAlpha * (0.4 + 0.6 * Math.sin(time * this.twinkleSpeed + this.phase) * 0.5 + 0.5);

        // Soft wrapping
        if (this.x < -20) this.x += W + 40;
        if (this.x > W + 20) this.x -= W + 40;
        if (this.y < -20) this.y += H + 40;
        if (this.y > H + 20) this.y -= H + 40;
      }

      draw() {
        // Main dot
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;
        ctx.fill();

        // Soft glow halo for brighter/larger particles
        if (this.size > 1.2 && this.alpha > 0.3) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha * 0.08})`;
          ctx.fill();
        }
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    // Spatial grid for efficient connections
    function drawConnections() {
      const cellSize = CONNECTION_DIST;
      const cols = Math.ceil(W / cellSize) + 1;
      const rows = Math.ceil(H / cellSize) + 1;
      const grid = new Array(cols * rows);
      for (let i = 0; i < grid.length; i++) grid[i] = [];

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const cx = Math.floor(p.x / cellSize);
        const cy = Math.floor(p.y / cellSize);
        if (cx >= 0 && cx < cols && cy >= 0 && cy < rows) {
          grid[cy * cols + cx].push(i);
        }
      }

      ctx.lineWidth = 0.4;
      const maxDistSq = CONNECTION_DIST * CONNECTION_DIST;

      for (let cy = 0; cy < rows; cy++) {
        for (let cx = 0; cx < cols; cx++) {
          const cell = grid[cy * cols + cx];
          // Check neighbors
          for (let ncx = cx; ncx <= cx + 1 && ncx < cols; ncx++) {
            for (let ncy = cy; ncy <= cy + 1 && ncy < rows; ncy++) {
              const neighborCell = grid[ncy * cols + ncx];
              const startJ = (ncx === cx && ncy === cy) ? 0 : 0;
              for (let ii = 0; ii < cell.length; ii++) {
                const a = particles[cell[ii]];
                for (let jj = (ncx === cx && ncy === cy ? ii + 1 : 0); jj < neighborCell.length; jj++) {
                  const b = particles[neighborCell[jj]];
                  const dx = a.x - b.x;
                  const dy = a.y - b.y;
                  const distSq = dx * dx + dy * dy;
                  if (distSq < maxDistSq) {
                    const alpha = (1 - distSq / maxDistSq) * 0.06;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = `rgba(74, 158, 255, ${alpha})`;
                    ctx.stroke();
                  }
                }
              }
            }
          }
        }
      }
    }

    // Animation
    const startTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const time = (performance.now() - startTime) / 1000;

      ctx.clearRect(0, 0, W, H);

      // Subtle vignette
      const grad = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.8);
      grad.addColorStop(0, 'rgba(10,10,15,0)');
      grad.addColorStop(1, 'rgba(5,5,10,0.5)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      drawConnections();

      for (const p of particles) {
        p.update(time);
        p.draw();
      }
    }

    animate();
  </script>
</body>
</html>
